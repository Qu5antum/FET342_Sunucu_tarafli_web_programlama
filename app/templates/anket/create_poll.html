<!DOCTYPE html>
<html>
<head>
    <title>Anket</title>
</head>
<body>

<div class="upper_bar">
    <div class="nav-container">
        <a href="{% url 'anket:polls' %}">Geri</a>
        
        <div class="nav-right">
            <a href="/account" class="nav-link">Hesabım</a>
        </div>
    </div>
</div>

<h2>Anket Oluştur</h2>

<form method="post">
    {% csrf_token %}

    <input type="text" name="title" placeholder="İsim" required><br><br>

    <textarea name="description" placeholder="Tanım"></textarea><br><br>

    <label>Gruplar:</label><br>
    {% for group in groups %}
        <input type="checkbox" name="groups" value="{{ group.id }}">
        {{ group.name }}<br>
    {% endfor %}

    <label>Görünürlük</label><br>
    {% for value, label in visibilities %}
        <input type="radio" name="visibility" value="{{ value }}"
            {% if value == "private" %}checked{% endif %}>
        {{ label }}<br>
    {% endfor %}

    <hr>

    <div id="questions"></div>

    <button type="button" onclick="addQuestion()">+ Soru</button>

    <br><br>

    <input type="hidden" name="questions" id="questionsInput">

    <button type="submit" onclick="prepareData()">Oluştur</button>  
</form>

<script>
let questions = []

function addQuestion() {
    questions.push({ text: "", options: [""] })
    render()
}

function addOption(qIndex) {
    questions[qIndex].options.push("")
    render()
}

function updateQuestionText(index, value) {
    questions[index].text = value
}

function updateOption(qIndex, oIndex, value) {
    questions[qIndex].options[oIndex] = value
}

function render() {
    const container = document.getElementById("questions")
    container.innerHTML = ""

    questions.forEach((q, qIndex) => {
        let qDiv = document.createElement("div")

        qDiv.innerHTML = `
            <input type="text" placeholder="Soru"
                onchange="updateQuestionText(${qIndex}, this.value)">

            <div>
                ${q.options.map((opt, oIndex) => `
                    <input type="text" placeholder="Seçenek"
                        onchange="updateOption(${qIndex}, ${oIndex}, this.value)">
                `).join("")}
            </div>

            <button type="button" onclick="addOption(${qIndex})">+ Seçenek</button>
            <hr>
        `

        container.appendChild(qDiv)
    })
}

function prepareData() {
    alert("Anket başarıyla oluşturuldu");
    document.getElementById("questionsInput").value = JSON.stringify(questions);
}
</script>

</body>
</html>
