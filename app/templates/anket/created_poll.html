<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Anket Oluşturuldu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7fa;
            color: #334155;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .success-card {
            background: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            border-top: 6px solid #27ae60; 
        }
        .success-icon {
            width: 60px;
            height: 60px;
            background-color: #dcfce7;
            color: #166534;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 20px;
        }
        h2 {
            color: #1e293b;
            margin: 0 0 10px 0;
            font-size: 24px;
        }
        .poll-title {
            color: #1a3a5f;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 30px;
            display: block;
        }
        .share-box {
            background-color: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 30px;
        }
        .share-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-align: left;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        #shareInput {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            background-color: #ffffff;
            color: #334155;
            outline: none;
        }
        .copy-btn {
            background-color: #1a3a5f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            background-color: #2c5282;
            transform: translateY(-1px);
        }
        .back-link {
            display: inline-block;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #1a3a5f;
            text-decoration: underline;
        }
        .public-msg {
            color: #64748b;
            font-style: italic;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <h2>Anket Başarıyla Oluşturuldu</h2>
        <span class="poll-title">{{ poll.title }}</span>

        {% if url %}
            <div class="share-box">
                <span class="share-label">Paylaşım Linki</span>
                <div class="input-group">
                    <input type="text" value="{{ url }}" id="shareInput" readonly>
                    <button class="copy-btn" onclick="copyLink()">Kopyala</button>
                </div>
            </div>
        {% else %}
            <p class="public-msg">Bu anket herkese açık (public) olarak ayarlandı.</p>
        {% endif %}

        <a href="{% url 'anket:polls' %}" class="back-link">Anket Listesine Dön</a>
    </div>

    <script>
    function copyLink() {
        const input = document.getElementById("shareInput");
        input.select();
        input.setSelectionRange(0, 99999); 
        
        navigator.clipboard.writeText(input.value).then(() => {
            alert("Link başarıyla kopyalandı!");
        }).catch(err => {
            document.execCommand("copy");
            alert("Link kopyalandı");
        });
    }
    </script>

</body>
</html>
